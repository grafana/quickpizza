# DEMO: This workflow demonstrates how to use the grafana/setup-k6-action and
# grafana/run-k6-action GitHub Actions for browser testing. It is not part of
# the real CI pipeline. See ci.yaml for the authoritative
# test workflow.
name: Example Browser Tests Workflow
on: [push]

jobs:
  basic_k6_browser_test:
    name: k6 test run - browser test example
    runs-on: ubuntu-latest
    env:
      # Use system Chrome — bundled Chromium often SIGTRAP / D-Bus failures on GHA (xk6-browser e2e).
      K6_BROWSER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
      # Chrome 146+ on GHA: avoid crashpad on missing cpufreq sysfs (puppeteer#14742).
      # k6 splits K6_BROWSER_ARGS on commas; value must be a single disable-features=… token.
      K6_BROWSER_ARGS: "no-sandbox,disable-dev-shm-usage,disable-features=PartitionAllocSchedulerLoopQuarantineTaskControlledPurge"
      # Avoid "Failed to connect to the bus" from Chromium on headless runners.
      DBUS_SESSION_BUS_ADDRESS: /dev/null

    services:
      quickpizza:
        image: ghcr.io/grafana/quickpizza-local:0.15.23@sha256:023e5299dece56f7d5a0bbd8fcab4dd69cb13478bb61c9c406f0cfaad1fa4f48 # zizmor: ignore[unpinned-images]
        ports:
          - 3333:3333

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Google Chrome
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y wget
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor --yes -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Setup k6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1
        with:
          browser: true
      - name: Run k6 test
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: |
            ./k6/browser/01.basic.js

  k6_all_browser_tests:
    name: k6 test run - all browser tests
    runs-on: ubuntu-latest
    env:
      # Use system Chrome — bundled Chromium often SIGTRAP / D-Bus failures on GHA (xk6-browser e2e).
      K6_BROWSER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
      # Chrome 146+ on GHA: avoid crashpad on missing cpufreq sysfs (puppeteer#14742).
      # k6 splits K6_BROWSER_ARGS on commas; value must be a single disable-features=… token.
      K6_BROWSER_ARGS: "no-sandbox,disable-dev-shm-usage,disable-features=PartitionAllocSchedulerLoopQuarantineTaskControlledPurge"
      # Avoid "Failed to connect to the bus" from Chromium on headless runners.
      DBUS_SESSION_BUS_ADDRESS: /dev/null

    services:
      quickpizza:
        image: ghcr.io/grafana/quickpizza-local:0.15.23@sha256:023e5299dece56f7d5a0bbd8fcab4dd69cb13478bb61c9c406f0cfaad1fa4f48 # zizmor: ignore[unpinned-images]
        ports:
          - 3333:3333

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Google Chrome
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y wget
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor --yes -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Setup k6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1
        with:
          browser: true
      - name: Run k6 test
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: |
            ./k6/browser/*.js

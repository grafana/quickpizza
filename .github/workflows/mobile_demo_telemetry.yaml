name: Mobile Demo Telemetry

on:
  # For development: trigger on PR changes to iterate easily
  pull_request:
    paths:
      - ".github/workflows/mobile_demo_telemetry.yaml"
      - "Mobiles/e2e/**"
      - "Mobiles/flutter/**"
      - "Mobiles/react-native/**"
      - "Mobiles/android/**"
      - "Mobiles/ios/**"
      - "compose.grafana-cloud.microservices.yaml"
  # Manual trigger for ad hoc testing
  workflow_dispatch:
    inputs:
      run_diagnostics:
        description: "Also run Debug-tab diagnostics that emit handled exceptions and intentional crashes"
        required: false
        default: false
        type: boolean
  # Scheduled run every hour for continuous telemetry
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_CHANNEL: "stable"

jobs:
  build-flutter-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          repo_secrets: |
            FARO_COLLECTOR_URL=faro_collector_url:value

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046 # v2.19.0
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Cache APK
        id: cache-apk
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: Mobiles/flutter/build/app/outputs/flutter-apk/app-debug.apk
          # Hash only Flutter Android APK inputs so Flutter changes rebuild,
          # while unrelated repo changes (iOS/backend/frontend) keep cache hits.
          key: apk-cache-${{ runner.os }}-${{ env.FLUTTER_CHANNEL }}-${{ hashFiles('Mobiles/flutter/pubspec.yaml', 'Mobiles/flutter/pubspec.lock', 'Mobiles/flutter/lib/**', 'Mobiles/flutter/android/**', 'Mobiles/flutter/assets/**', '.github/workflows/mobile_demo_telemetry.yaml') }}

      - name: Log cache status
        env:
          CACHE_HIT: ${{ steps.cache-apk.outputs.cache-hit }}
        run: |
          if [ "$CACHE_HIT" = "true" ]; then
            echo "✅ APK found in cache, skipping build"
            ls -la Mobiles/flutter/build/app/outputs/flutter-apk/app-debug.apk
          else
            echo "❌ APK not in cache, will build"
          fi

      - name: Install Flutter dependencies
        if: steps.cache-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/flutter
        run: flutter pub get

      - name: Create config.json for CI
        if: steps.cache-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/flutter
        env:
          FARO_COLLECTOR_URL: ${{ env.FARO_COLLECTOR_URL }}
        run: |
          cat > config.json << EOF
          {
            "FARO_COLLECTOR_URL": "${FARO_COLLECTOR_URL}",
            "BASE_URL": "",
            "PORT": "3333",
            "CI_DEMO_VERSIONING": "true"
          }
          EOF
          echo "Created config.json:"
          cat config.json

      - name: Build APK (debug)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/flutter
        run: |
          echo "Building APK..."
          flutter build apk --debug --dart-define-from-file=config.json
          echo "APK built successfully"
          ls -la build/app/outputs/flutter-apk/

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flutter-apk
          path: Mobiles/flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1

  build-react-native-apk:
    name: Build React Native APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          repo_secrets: |
            FARO_COLLECTOR_URL_RN=faro_collector_url_rn:value

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout faro-react-native-sdk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: grafana/faro-react-native-sdk
          path: faro-react-native-sdk
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ">=24.5.0"

      - name: Enable Corepack
        run: corepack enable

      - name: Cache React Native APK
        id: cache-rn-apk
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: Mobiles/react-native/android/app/build/outputs/apk/debug/app-debug.apk
          # Hash only React Native Android APK inputs so RN changes rebuild,
          # while unrelated repo changes (Flutter/iOS/backend) keep cache hits.
          key: rn-apk-cache-${{ runner.os }}-${{ hashFiles('Mobiles/react-native/package.json', 'Mobiles/react-native/yarn.lock', 'Mobiles/react-native/src/**', 'Mobiles/react-native/android/**', 'Mobiles/react-native/App.tsx', 'Mobiles/react-native/index.js', 'Mobiles/react-native/babel.config.js', 'Mobiles/react-native/metro.config.js', 'Mobiles/react-native/app.json', 'Mobiles/react-native/tsconfig.json', '.github/workflows/mobile_demo_telemetry.yaml') }}

      - name: Log React Native APK cache status
        env:
          CACHE_HIT: ${{ steps.cache-rn-apk.outputs.cache-hit }}
        run: |
          if [ "$CACHE_HIT" = "true" ]; then
            echo "✅ React Native APK found in cache, skipping build"
            ls -la Mobiles/react-native/android/app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ React Native APK not in cache, will build"
          fi

      - name: Install dependencies
        if: steps.cache-rn-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/react-native
        run: yarn install --immutable

      - name: Create config.json for CI
        if: steps.cache-rn-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/react-native
        env:
          FARO_COLLECTOR_URL: ${{ env.FARO_COLLECTOR_URL_RN }}
        run: |
          cat > config.json << EOF
          {
            "FARO_COLLECTOR_URL": "${FARO_COLLECTOR_URL}",
            "BASE_URL": "",
            "PORT": "3333"
          }
          EOF
          echo "Created config.json (FARO_COLLECTOR_URL redacted)"

      - name: Bundle JS for offline debug APK
        if: steps.cache-rn-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/react-native
        run: |
          mkdir -p android/app/src/main/assets
          yarn react-native bundle \
            --platform android \
            --dev true \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK (debug)
        if: steps.cache-rn-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/react-native/android
        run: |
          echo "Building React Native APK..."
          ./gradlew assembleDebug
          echo "APK built successfully"
          ls -la app/build/outputs/apk/debug/

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: react-native-apk
          path: Mobiles/react-native/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  build-android-native-apk:
    name: Build Android Native APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          repo_secrets: |
            OTLP_ENDPOINT=otlp_endpoint_android_native:value
            OTLP_INSTANCE_ID=otlp_instance_id_android_native:value
            OTLP_API_KEY=otlp_api_key_android_native:value

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache Android Native APK
        id: cache-android-native-apk
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: Mobiles/android/app/build/outputs/apk/debug/app-debug.apk
          # Hash native Android build inputs so source/Gradle changes rebuild,
          # while unrelated repo changes (Flutter/RN/backend) keep cache hits.
          # Note: OTLP secrets aren't hashed; rotate secrets => manually clear cache or rerun.
          key: android-native-apk-cache-${{ runner.os }}-${{ hashFiles('Mobiles/android/app/build.gradle.kts', 'Mobiles/android/build.gradle.kts', 'Mobiles/android/settings.gradle.kts', 'Mobiles/android/gradle/libs.versions.toml', 'Mobiles/android/gradle.properties', 'Mobiles/android/app/src/**', '.github/workflows/mobile_demo_telemetry.yaml') }}

      - name: Log Android Native APK cache status
        env:
          CACHE_HIT: ${{ steps.cache-android-native-apk.outputs.cache-hit }}
        run: |
          if [ "$CACHE_HIT" = "true" ]; then
            echo "✅ Android Native APK found in cache, skipping build"
            ls -la Mobiles/android/app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ Android Native APK not in cache, will build"
          fi

      - name: Create config.json for CI
        if: steps.cache-android-native-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/android
        env:
          OTLP_ENDPOINT: ${{ env.OTLP_ENDPOINT }}
          OTLP_INSTANCE_ID: ${{ env.OTLP_INSTANCE_ID }}
          OTLP_API_KEY: ${{ env.OTLP_API_KEY }}
        run: |
          mkdir -p app/src/main/res/raw
          cat > app/src/main/res/raw/config.json << EOF
          {
            "OTLP_ENDPOINT": "${OTLP_ENDPOINT}",
            "OTLP_INSTANCE_ID": "${OTLP_INSTANCE_ID}",
            "OTLP_API_KEY": "${OTLP_API_KEY}",
            "BASE_URL": ""
          }
          EOF
          echo "Created config.json (secrets redacted)"

      - name: Build APK (debug)
        if: steps.cache-android-native-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/android
        run: |
          echo "Building native Android APK..."
          ./gradlew :app:assembleDebug
          echo "APK built successfully"
          ls -la app/build/outputs/apk/debug/

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-native-apk
          path: Mobiles/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  build-ios-native-app:
    name: Build iOS Native .app
    # macOS-only: xcodebuild lives in Xcode and only runs on macOS runners.
    # macos-15 includes a new enough Xcode to open QuickPizzaIos.xcodeproj
    # (project file format 77). Pinned rather than -latest so a GitHub-side
    # macOS image bump doesn't silently invalidate the build cache or break
    # a working Xcode version.
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          # Reuse the Android Native OTLP creds: both apps ship to the same
          # Grafana Cloud stack and are separated by the `service.name`
          # resource attribute (quickpizza-android vs quickpizza-ios) in
          # the shared "Android & iOS OTel RUM" dashboard.
          repo_secrets: |
            OTLP_ENDPOINT=otlp_endpoint_android_native:value
            OTLP_INSTANCE_ID=otlp_instance_id_android_native:value
            OTLP_API_KEY=otlp_api_key_android_native:value

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache iOS .app and DerivedData
        id: cache-ios-app
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # The .app is a directory bundle; tar/zip it as part of the build
          # step so the cache can store a single file. DerivedData is cached
          # alongside to keep SPM-resolved deps + module cache between runs;
          # without it linking adds ~2-3 min.
          path: |
            Mobiles/ios/build/ci/QuickPizzaIos.app.tar.gz
            Mobiles/ios/DerivedData
          # Hash only iOS build inputs so iOS source changes rebuild while
          # unrelated repo changes (Flutter/RN/Android/backend) keep cache
          # hits. OTLP secrets aren't hashed; rotate secrets => clear cache
          # or rerun manually.
          key: ios-native-app-cache-${{ runner.os }}-${{ hashFiles('Mobiles/ios/QuickPizzaIos.xcodeproj/**', 'Mobiles/ios/QuickPizzaIos/**', 'Mobiles/ios/Scripts/**', 'Mobiles/ios/Config.xcconfig.example', '.github/workflows/mobile_demo_telemetry.yaml') }}

      - name: Log iOS app cache status
        env:
          CACHE_HIT: ${{ steps.cache-ios-app.outputs.cache-hit }}
        run: |
          if [ "$CACHE_HIT" = "true" ]; then
            echo "iOS .app found in cache, skipping build"
            ls -la Mobiles/ios/build/ci/QuickPizzaIos.app.tar.gz
          else
            echo "iOS .app not in cache, will build"
          fi

      - name: Show Xcode version
        if: steps.cache-ios-app.outputs.cache-hit != 'true'
        run: |
          xcodebuild -version
          xcrun --show-sdk-path --sdk iphonesimulator

      - name: Create Config.xcconfig for CI
        if: steps.cache-ios-app.outputs.cache-hit != 'true'
        working-directory: Mobiles/ios
        env:
          OTLP_ENDPOINT: ${{ env.OTLP_ENDPOINT }}
          OTLP_INSTANCE_ID: ${{ env.OTLP_INSTANCE_ID }}
          OTLP_API_KEY: ${{ env.OTLP_API_KEY }}
        run: |
          # BASE_URL points at localhost on the host running the simulator,
          # which is the same machine as the runner. xcconfig URLs require
          # /$()/ to escape the :// since semicolons split values.
          cat > Config.xcconfig <<EOF
          BASE_URL = http:/\$()/localhost:3333
          PORT = 3333
          OTLP_ENDPOINT = ${OTLP_ENDPOINT}
          OTLP_INSTANCE_ID = ${OTLP_INSTANCE_ID}
          OTLP_API_KEY = ${OTLP_API_KEY}
          EOF
          echo "Created Config.xcconfig (secrets redacted)"

      - name: Build iOS .app for Simulator
        if: steps.cache-ios-app.outputs.cache-hit != 'true'
        working-directory: Mobiles/ios
        run: |
          set -e
          echo "Building QuickPizzaIos.app for iOS Simulator..."
          # generic/platform=iOS Simulator avoids xcodebuild requiring a
          # specific simulator to exist at build time; the resulting .app runs
          # on arm64 iOS simulators available on the macOS runner image.
          # Force unsigned simulator build: the runner has no access to the
          # repo's Apple Developer team, and simulator builds don't need a
          # signature anyway. All three CODE_SIGN_* flags are required for
          # this to work reliably across Xcode versions.
          mkdir -p build/ci
          SRCROOT="$PWD" Scripts/generate-config.sh
          set +e
          xcodebuild \
            -project QuickPizzaIos.xcodeproj \
            -scheme QuickPizzaIos \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            build > build/ci/xcodebuild.log 2>&1
          build_status=$?
          set -e

          if [ "$build_status" -ne 0 ]; then
            echo "xcodebuild failed with status $build_status"
            echo "Relevant build diagnostics:"
            grep -nE "error:|fatal error:|BUILD FAILED|The following build commands failed|Command SwiftCompile failed" build/ci/xcodebuild.log | tail -200 || true
            echo "Last 300 xcodebuild log lines:"
            tail -300 build/ci/xcodebuild.log
            exit "$build_status"
          fi

          tail -80 build/ci/xcodebuild.log

          APP_PATH=$(find DerivedData/Build/Products -name "QuickPizzaIos.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not locate built QuickPizzaIos.app under DerivedData"
            exit 1
          fi
          echo "Built app: $APP_PATH"

          # tar.gz so cache + upload-artifact handle it as a single file
          # (the .app is a directory bundle; tar preserves the symlinks
          # and permissions xcrun simctl needs at install time). A debug
          # build is ~150-300 MB raw; gzip brings the artifact down to a
          # more reasonable size.
          tar -C "$(dirname "$APP_PATH")" -czf build/ci/QuickPizzaIos.app.tar.gz "$(basename "$APP_PATH")"
          ls -la build/ci/

      - name: Upload iOS build log
        if: failure() && steps.cache-ios-app.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-native-build-log
          path: Mobiles/ios/build/ci/xcodebuild.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload .app artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-native-app
          path: Mobiles/ios/build/ci/QuickPizzaIos.app.tar.gz
          retention-days: 1

  run-mobile-demo:
    name: Run Mobile Demo
    needs:
      - build-flutter-apk
      - build-react-native-apk
      - build-android-native-apk
    if: ${{ needs.build-flutter-apk.result == 'success' && needs.build-react-native-apk.result == 'success' && needs.build-android-native-apk.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          repo_secrets: |
            GRAFANA_CLOUD_STACK=grafana_cloud_stack:value
            GRAFANA_CLOUD_TOKEN=grafana_cloud_token:value
            OPENAI_API_KEY=openai_api_key:value

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download Flutter APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: flutter-apk
          path: apk/flutter/

      - name: Download React Native APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: react-native-apk
          path: apk/react-native/

      - name: Download Android Native APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-native-apk
          path: apk/android-native/

      - name: Verify APKs
        run: |
          echo "Verifying downloaded APKs..."
          ls -la apk/flutter/
          file apk/flutter/app-debug.apk
          echo "Flutter APK size: $(du -h apk/flutter/app-debug.apk | cut -f1)"
          ls -la apk/react-native/
          file apk/react-native/app-debug.apk
          echo "React Native APK size: $(du -h apk/react-native/app-debug.apk | cut -f1)"
          ls -la apk/android-native/
          file apk/android-native/app-debug.apk
          echo "Android Native APK size: $(du -h apk/android-native/app-debug.apk | cut -f1)"
          echo "APKs verified"

      - name: Start QuickPizza backend (Docker Compose)
        env:
          GRAFANA_CLOUD_STACK: ${{ env.GRAFANA_CLOUD_STACK }}
          GRAFANA_CLOUD_TOKEN: ${{ env.GRAFANA_CLOUD_TOKEN }}
          DEPLOYMENT_ENVIRONMENT: ci
          # Use dev Alloy config for grafana-dev.net stack
          ALLOY_FILE_NAME: cloud-dev.alloy
        run: |
          echo "Starting QuickPizza backend (Grafana Cloud microservices + dev Alloy override)..."
          docker compose -f compose.grafana-cloud.microservices.yaml -f compose.grafana-cloud.dev-override.yaml up -d
          docker compose -f compose.grafana-cloud.microservices.yaml -f compose.grafana-cloud.dev-override.yaml ps
          
          echo "Waiting for backend to be ready..."
          for i in {1..60}; do
            if curl -fsS "http://localhost:3333/ready" > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting for backend... attempt $i/60"
            sleep 2
          done
          
          echo "Backend did not become ready in time"
          docker compose -f compose.grafana-cloud.microservices.yaml -f compose.grafana-cloud.dev-override.yaml logs --no-color
          exit 1

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: Free disk space for Android emulator
        run: |
          echo "Disk space before cleanup:"
          df -h
          
          echo "Removing unnecessary tools..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          
          echo "Disk space after cleanup:"
          df -h

      - name: Set up Node.js (shared e2e HTML report generator)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ">=24.5.0"

      - name: Setup npm
        run: npm install -g npm@11.10.0

      - name: Install shared e2e report generator deps
        working-directory: Mobiles/e2e/report-generator
        run: npm ci --ignore-scripts

      - name: Run Android emulator and e2e tests
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b # v2.35.0
        env:
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          RUN_DIAGNOSTICS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_diagnostics == true }}
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          disk-size: 6000M
          heap-size: 600M
          emulator-options: "-no-window -no-metrics"
          script: |
            echo "Emulator is running!"
            adb devices -l

            # Single reverse for all apps on the same emulator (devices use localhost:3333)
            echo "Setting up ADB reverse port forwarding..."
            adb reverse tcp:3333 tcp:3333

            echo "==> Flutter APK: install and E2E"
            adb install -r apk/flutter/app-debug.apk
            bash Mobiles/e2e/run_e2e_tests.sh --app=flutter --platform=android

            echo "==> React Native APK: install and E2E"
            adb install -r apk/react-native/app-debug.apk
            bash Mobiles/e2e/run_e2e_tests.sh --app=react-native --platform=android

            echo "==> Android Native APK: install and E2E"
            adb install -r apk/android-native/app-debug.apk
            bash Mobiles/e2e/run_e2e_tests.sh --app=android-native --platform=android

            if [ "$RUN_DIAGNOSTICS" = "true" ]; then
              echo "==> Flutter APK: diagnostics E2E"
              bash Mobiles/e2e/run_e2e_tests.sh --app=flutter --platform=android --flow=diagnostics

              echo "==> React Native APK: diagnostics E2E"
              bash Mobiles/e2e/run_e2e_tests.sh --app=react-native --platform=android --flow=diagnostics

              echo "==> Android Native APK: diagnostics E2E"
              bash Mobiles/e2e/run_e2e_tests.sh --app=android-native --platform=android --flow=diagnostics
            else
              echo "Skipping diagnostics flow. Set workflow_dispatch input run_diagnostics=true to run it manually."
            fi

            echo "E2E tests completed (Flutter, React Native, Android Native on same emulator)."

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Suffixed so the iOS leg (run-ios-mobile-demo) can publish a
          # parallel artifact without colliding with this one — artifact
          # names must be unique within a workflow run.
          name: e2e-test-results-android
          path: Mobiles/e2e/results/
          retention-days: 1
          if-no-files-found: ignore

      - name: Collect backend logs
        if: always()
        run: |
          docker compose -f compose.grafana-cloud.microservices.yaml -f compose.grafana-cloud.dev-override.yaml logs --no-color > backend.log 2>&1 || true

      - name: Stop backend
        if: always()
        run: |
          docker compose -f compose.grafana-cloud.microservices.yaml -f compose.grafana-cloud.dev-override.yaml down -v || true

      - name: Upload backend logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-logs-android
          path: backend.log
          retention-days: 3
          if-no-files-found: ignore

  run-ios-mobile-demo:
    name: Run iOS Mobile Demo
    needs:
      - build-ios-native-app
    if: ${{ needs.build-ios-native-app.result == 'success' }}
    # macOS-only: xcrun simctl + the booted iOS simulator only work on macOS.
    # Uses the same pinned macOS runner as the iOS build job so caches line up.
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          repo_secrets: |
            GRAFANA_CLOUD_STACK=grafana_cloud_stack:value
            GRAFANA_CLOUD_TOKEN=grafana_cloud_token:value
            OPENAI_API_KEY=openai_api_key:value

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download iOS .app artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ios-native-app
          path: ios-app/

      - name: Untar iOS .app
        run: |
          set -e
          ls -la ios-app/
          mkdir -p ios-app/unpacked
          tar -C ios-app/unpacked -xzf ios-app/QuickPizzaIos.app.tar.gz
          APP_PATH="$(pwd)/ios-app/unpacked/QuickPizzaIos.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected QuickPizzaIos.app at $APP_PATH but it does not exist"
            exit 1
          fi
          echo "IOS_APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Unpacked .app: $APP_PATH"

      - name: Set up Go (QuickPizza backend)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build QuickPizza backend
        run: |
          set -e
          make build-go

      - name: Start QuickPizza backend
        env:
          DEPLOYMENT_ENVIRONMENT: ci
        run: |
          set -e
          touch backend-ios.log
          echo "Starting QuickPizza backend natively on macOS..."
          QUICKPIZZA_TRUST_CLIENT_TRACEID=1 \
          QUICKPIZZA_ENABLE_ALL_SERVICES=1 \
          QUICKPIZZA_DB= \
          QUICKPIZZA_TIMEOUT=10s \
          QUICKPIZZA_OTEL_SERVICE_NAME=quickpizza-ios-ci-backend \
          OTEL_RESOURCE_ATTRIBUTES="deployment.environment=${DEPLOYMENT_ENVIRONMENT},service.version=quickpizza-local" \
          ./bin/quickpizza > backend-ios.log 2>&1 &
          echo "$!" > backend-ios.pid

          echo "Waiting for backend to be ready..."
          for i in {1..60}; do
            if curl -fsS "http://localhost:3333/ready" > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting for backend... attempt $i/60"
            sleep 2
          done

          echo "Backend did not become ready in time"
          cat backend-ios.log
          exit 1

      - name: Boot iOS simulator + install app
        run: |
          set -e
          # Pick the newest available iPhone runtime/device on the runner.
          # macos-14 ships several iOS runtimes; we don't hard-code one so
          # an image bump doesn't break the workflow. Resolve to a UDID
          # because `simctl bootstatus` requires a UDID (not a name), and
          # because device names contain spaces ("iPhone 15 Pro") which
          # make `read` splitting fragile. Tab-separate UDID + name so the
          # log shows which device we picked without ambiguity.
          IFS=$'\t' read -r DEVICE_UDID DEVICE_NAME < <(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          for runtime in sorted(data.get("devices", {}).keys(), reverse=True):
              for d in data["devices"][runtime]:
                  if d.get("isAvailable") and "iPhone" in d.get("name", ""):
                      print(d["udid"], d["name"], sep="\t")
                      sys.exit(0)
          sys.exit(1)
          ')
          if [ -z "$DEVICE_UDID" ]; then
            echo "No available iPhone simulator on this runner image"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting simulator: $DEVICE_NAME ($DEVICE_UDID)"
          xcrun simctl boot "$DEVICE_UDID" || true
          # Wait until the simulator finishes booting before installing —
          # `simctl install` on a still-booting device is a common cause of
          # silent install failures.
          xcrun simctl bootstatus "$DEVICE_UDID" -b
          xcrun simctl list devices booted

          echo "Installing $IOS_APP_PATH..."
          xcrun simctl install booted "$IOS_APP_PATH"
          xcrun simctl get_app_container booted com.grafana.QuickPizzaIos

      - name: Set up Node.js (shared e2e HTML report generator)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ">=24.5.0"

      - name: Setup npm
        run: npm install -g npm@11.10.0

      - name: Install shared e2e report generator deps
        working-directory: Mobiles/e2e/report-generator
        run: npm ci --ignore-scripts

      - name: Run iOS e2e
        env:
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          RUN_DIAGNOSTICS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_diagnostics == true }}
        run: |
          bash Mobiles/e2e/run_e2e_tests.sh --app=ios-native --platform=ios
          if [ "$RUN_DIAGNOSTICS" = "true" ]; then
            bash Mobiles/e2e/run_e2e_tests.sh --app=ios-native --platform=ios --flow=diagnostics
          else
            echo "Skipping diagnostics flow. Set workflow_dispatch input run_diagnostics=true to run it manually."
          fi

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Suffixed to avoid colliding with the Android leg's artifact.
          name: e2e-test-results-ios
          path: Mobiles/e2e/results/
          retention-days: 1
          if-no-files-found: ignore

      - name: Collect backend logs
        if: always()
        run: |
          if [ -f backend-ios.log ]; then
            tail -200 backend-ios.log
          fi

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend-ios.pid ]; then
            kill "$(cat backend-ios.pid)" || true
          fi

      - name: Upload backend logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-logs-ios
          path: backend-ios.log
          retention-days: 3
          if-no-files-found: ignore

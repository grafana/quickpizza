name: Mobile Demo Telemetry

on:
  # For development: trigger on PR changes to iterate easily
  pull_request:
    paths:
      - ".github/workflows/mobile_demo_telemetry.yaml"
      - "Mobiles/flutter/**"
      - "Mobiles/react-native/**"
      - "compose.grafana-cloud.monolithic.yaml"
  # Manual trigger for testing
  workflow_dispatch:
  # Scheduled run every hour for continuous telemetry
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_CHANNEL: "stable"

jobs:
  build-flutter-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          repo_secrets: |
            FARO_COLLECTOR_URL=faro_collector_url:value

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046 # v2.19.0
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Cache APK
        id: cache-apk
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: Mobiles/flutter/build/app/outputs/flutter-apk/app-debug.apk
          # Hash only Flutter Android APK inputs so Flutter changes rebuild,
          # while unrelated repo changes (iOS/backend/frontend) keep cache hits.
          key: apk-cache-${{ runner.os }}-${{ env.FLUTTER_CHANNEL }}-${{ hashFiles('Mobiles/flutter/pubspec.yaml', 'Mobiles/flutter/pubspec.lock', 'Mobiles/flutter/lib/**', 'Mobiles/flutter/android/**', 'Mobiles/flutter/assets/**', '.github/workflows/mobile_demo_telemetry.yaml') }}

      - name: Log cache status
        run: |
          if [ "${{ steps.cache-apk.outputs.cache-hit }}" = "true" ]; then
            echo "✅ APK found in cache, skipping build"
            ls -la Mobiles/flutter/build/app/outputs/flutter-apk/app-debug.apk
          else
            echo "❌ APK not in cache, will build"
          fi

      - name: Install Flutter dependencies
        if: steps.cache-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/flutter
        run: flutter pub get

      - name: Create config.json for CI
        if: steps.cache-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/flutter
        env:
          FARO_COLLECTOR_URL: ${{ env.FARO_COLLECTOR_URL }}
        run: |
          cat > config.json << EOF
          {
            "FARO_COLLECTOR_URL": "${FARO_COLLECTOR_URL}",
            "BASE_URL": "",
            "PORT": "3333",
            "CI_DEMO_VERSIONING": "true"
          }
          EOF
          echo "Created config.json:"
          cat config.json

      - name: Build APK (debug)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/flutter
        run: |
          echo "Building APK..."
          flutter build apk --debug --dart-define-from-file=config.json
          echo "APK built successfully"
          ls -la build/app/outputs/flutter-apk/

      - name: Upload APK artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: flutter-apk
          path: Mobiles/flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1

  build-react-native-apk:
    name: Build React Native APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          repo_secrets: |
            FARO_COLLECTOR_URL_RN=faro_collector_url_rn:value

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout faro-react-native-sdk
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: grafana/faro-react-native-sdk
          path: faro-react-native-sdk

      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: Mobiles/react-native/yarn.lock

      - name: Cache React Native APK
        id: cache-rn-apk
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: Mobiles/react-native/android/app/build/outputs/apk/debug/app-debug.apk
          # Hash only React Native Android APK inputs so RN changes rebuild,
          # while unrelated repo changes (Flutter/iOS/backend) keep cache hits.
          key: rn-apk-cache-${{ runner.os }}-${{ hashFiles('Mobiles/react-native/package.json', 'Mobiles/react-native/yarn.lock', 'Mobiles/react-native/src/**', 'Mobiles/react-native/android/**', 'Mobiles/react-native/App.tsx', 'Mobiles/react-native/index.js', 'Mobiles/react-native/babel.config.js', 'Mobiles/react-native/metro.config.js', 'Mobiles/react-native/app.json', 'Mobiles/react-native/tsconfig.json', '.github/workflows/mobile_demo_telemetry.yaml') }}

      - name: Log React Native APK cache status
        run: |
          if [ "${{ steps.cache-rn-apk.outputs.cache-hit }}" = "true" ]; then
            echo "✅ React Native APK found in cache, skipping build"
            ls -la Mobiles/react-native/android/app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ React Native APK not in cache, will build"
          fi

      - name: Install dependencies
        if: steps.cache-rn-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/react-native
        run: yarn install --frozen-lockfile

      - name: Create config.json for CI
        if: steps.cache-rn-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/react-native
        env:
          FARO_COLLECTOR_URL: ${{ env.FARO_COLLECTOR_URL_RN }}
        run: |
          cat > config.json << EOF
          {
            "FARO_COLLECTOR_URL": "${FARO_COLLECTOR_URL}",
            "BASE_URL": "",
            "PORT": "3333"
          }
          EOF
          echo "Created config.json (FARO_COLLECTOR_URL redacted)"

      - name: Build APK (debug)
        if: steps.cache-rn-apk.outputs.cache-hit != 'true'
        working-directory: Mobiles/react-native/android
        run: |
          echo "Building React Native APK..."
          ./gradlew assembleDebug
          echo "APK built successfully"
          ls -la app/build/outputs/apk/debug/

      - name: Upload APK artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: react-native-apk
          path: Mobiles/react-native/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  run-mobile-demo:
    name: Run Mobile Demo
    needs:
      - build-flutter-apk
      - build-react-native-apk
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          repo_secrets: |
            GRAFANA_CLOUD_STACK=grafana_cloud_stack:value
            GRAFANA_CLOUD_TOKEN=grafana_cloud_token:value
            OPENAI_API_KEY=openai_api_key:value

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Flutter APK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: flutter-apk
          path: apk/flutter/

      - name: Download React Native APK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: react-native-apk
          path: apk/react-native/

      - name: Verify APKs
        run: |
          echo "Verifying downloaded APKs..."
          ls -la apk/flutter/ apk/react-native/
          file apk/flutter/app-debug.apk apk/react-native/app-debug.apk
          echo "Flutter APK size: $(du -h apk/flutter/app-debug.apk | cut -f1)"
          echo "React Native APK size: $(du -h apk/react-native/app-debug.apk | cut -f1)"
          echo "APKs verified"

      - name: Start QuickPizza backend (Docker Compose)
        env:
          GRAFANA_CLOUD_STACK: ${{ env.GRAFANA_CLOUD_STACK }}
          GRAFANA_CLOUD_TOKEN: ${{ env.GRAFANA_CLOUD_TOKEN }}
          DEPLOYMENT_ENVIRONMENT: ci
          # Use dev Alloy config for grafana-dev.net stack
          ALLOY_FILE_NAME: cloud-dev.alloy
        run: |
          echo "Starting QuickPizza backend with dev config..."
          # Use dev override for grafana-dev.net stack (adds required module mount)
          docker compose -f compose.grafana-cloud.monolithic.yaml -f compose.grafana-cloud.dev-override.yaml up -d
          docker compose -f compose.grafana-cloud.monolithic.yaml -f compose.grafana-cloud.dev-override.yaml ps
          
          echo "Waiting for backend to be ready..."
          for i in {1..60}; do
            if curl -fsS "http://localhost:3333/ready" > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting for backend... attempt $i/60"
            sleep 2
          done
          
          echo "Backend did not become ready in time"
          docker compose -f compose.grafana-cloud.monolithic.yaml -f compose.grafana-cloud.dev-override.yaml logs --no-color
          exit 1

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: Free disk space for Android emulator
        run: |
          echo "Disk space before cleanup:"
          df -h
          
          echo "Removing unnecessary tools..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          
          echo "Disk space after cleanup:"
          df -h

      - name: Set up Dart
        uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c # v1.7.1

      - name: Set up Node.js (React Native e2e HTML reports)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Run Android emulator and e2e tests
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b # v2.35.0
        env:
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          disk-size: 6000M
          heap-size: 600M
          emulator-options: "-no-window -no-metrics"
          script: |
            echo "Emulator is running!"
            adb devices -l

            # Single reverse for both apps (devices use localhost:3333)
            echo "Setting up ADB reverse port forwarding..."
            adb reverse tcp:3333 tcp:3333

            echo "==> Flutter APK: install and E2E"
            adb install -r apk/flutter/app-debug.apk
            cd Mobiles/flutter && chmod +x scripts/e2e/run_e2e_tests.sh && ./scripts/e2e/run_e2e_tests.sh
            cd ../..

            echo "==> React Native APK: install and E2E"
            adb install -r apk/react-native/app-debug.apk
            cd Mobiles/react-native && chmod +x scripts/e2e/run_e2e_tests.sh && ./scripts/e2e/run_e2e_tests.sh
            cd ../..

            echo "E2E tests completed (Flutter then React Native on same emulator)."

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: e2e-test-results
          path: |
            Mobiles/flutter/arbigent-result/
            Mobiles/react-native/arbigent-result/
          retention-days: 1
          if-no-files-found: ignore

      - name: Collect backend logs
        if: always()
        run: |
          docker compose -f compose.grafana-cloud.monolithic.yaml -f compose.grafana-cloud.dev-override.yaml logs --no-color > backend.log 2>&1 || true

      - name: Stop backend
        if: always()
        run: |
          docker compose -f compose.grafana-cloud.monolithic.yaml -f compose.grafana-cloud.dev-override.yaml down -v || true

      - name: Upload backend logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: backend-logs
          path: backend.log
          retention-days: 3
          if-no-files-found: ignore

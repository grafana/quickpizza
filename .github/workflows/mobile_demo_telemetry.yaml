name: Mobile Demo Telemetry

on:
  # Manual trigger for ad hoc testing (pick branch in Actions UI)
  workflow_dispatch: {}
  # Scheduled run every hour for continuous telemetry
  schedule:
    - cron: "0 * * * *"
  # Post-merge full telemetry on main (PR compile checks use mobile_demo_telemetry_build.yaml)
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mobile_demo_telemetry.yaml"
      - "Mobiles/e2e/**"
      - "Mobiles/flutter/**"
      - "Mobiles/react-native/**"
      - "Mobiles/android/**"
      - "Mobiles/ios/**"
      - "compose.grafana-cloud.microservices.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_CHANNEL: "stable"

jobs:
  run-mobile-demo:
    name: Run Mobile Demo
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: mobile-demo-telemetry
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          repo_secrets: |
            FARO_COLLECTOR_URL=faro_collector_url:value
            FARO_COLLECTOR_URL_RN=faro_collector_url_rn:value
            OTLP_ENDPOINT=otlp_endpoint_android_native:value
            OTLP_INSTANCE_ID=otlp_instance_id_android_native:value
            OTLP_API_KEY=otlp_api_key_android_native:value
            GRAFANA_CLOUD_STACK=grafana_cloud_stack:value
            GRAFANA_CLOUD_TOKEN=grafana_cloud_token:value
            OPENAI_API_KEY=openai_api_key:value

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Free disk space for Android builds and emulator
        run: |
          echo "Disk space before cleanup:"
          df -h

          echo "Removing unnecessary tools..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean

          echo "Disk space after cleanup:"
          df -h

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046 # v2.19.0
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Install Flutter dependencies
        working-directory: Mobiles/flutter
        run: flutter pub get

      - name: Create Flutter config.json for CI
        working-directory: Mobiles/flutter
        env:
          FARO_COLLECTOR_URL: ${{ env.FARO_COLLECTOR_URL }}
        run: |
          cat > config.json << EOF
          {
            "FARO_COLLECTOR_URL": "${FARO_COLLECTOR_URL}",
            "BASE_URL": "",
            "PORT": "3333",
            "CI_DEMO_VERSIONING": "true"
          }
          EOF
          echo "Created Flutter config.json (FARO_COLLECTOR_URL redacted)"

      - name: Build Flutter APK (debug)
        working-directory: Mobiles/flutter
        run: |
          echo "Building Flutter APK..."
          flutter build apk --debug --dart-define-from-file=config.json
          ls -la build/app/outputs/flutter-apk/

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ">=24.5.0"

      - name: Enable Corepack
        run: corepack enable

      - name: Install React Native dependencies
        working-directory: Mobiles/react-native
        run: yarn install --immutable

      - name: Create React Native config.json for CI
        working-directory: Mobiles/react-native
        env:
          FARO_COLLECTOR_URL: ${{ env.FARO_COLLECTOR_URL_RN }}
        run: |
          cat > config.json << EOF
          {
            "FARO_COLLECTOR_URL": "${FARO_COLLECTOR_URL}",
            "BASE_URL": "",
            "PORT": "3333"
          }
          EOF
          echo "Created React Native config.json (FARO_COLLECTOR_URL redacted)"

      - name: Bundle JS for offline debug APK
        working-directory: Mobiles/react-native
        run: |
          mkdir -p android/app/src/main/assets
          yarn react-native bundle \
            --platform android \
            --dev true \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build React Native APK (debug)
        working-directory: Mobiles/react-native/android
        run: |
          echo "Building React Native APK..."
          ./gradlew assembleDebug
          ls -la app/build/outputs/apk/debug/

      - name: Create Android Native config.json for CI
        working-directory: Mobiles/android
        env:
          OTLP_ENDPOINT: ${{ env.OTLP_ENDPOINT }}
          OTLP_INSTANCE_ID: ${{ env.OTLP_INSTANCE_ID }}
          OTLP_API_KEY: ${{ env.OTLP_API_KEY }}
        run: |
          mkdir -p app/src/main/res/raw
          cat > app/src/main/res/raw/config.json << EOF
          {
            "OTLP_ENDPOINT": "${OTLP_ENDPOINT}",
            "OTLP_INSTANCE_ID": "${OTLP_INSTANCE_ID}",
            "OTLP_API_KEY": "${OTLP_API_KEY}",
            "BASE_URL": ""
          }
          EOF
          echo "Created Android Native config.json (secrets redacted)"

      - name: Build Android Native APK (debug)
        working-directory: Mobiles/android
        run: |
          echo "Building native Android APK..."
          ./gradlew :app:assembleDebug
          ls -la app/build/outputs/apk/debug/

      - name: Stage APKs for e2e
        run: |
          mkdir -p apk/flutter apk/react-native apk/android-native
          cp Mobiles/flutter/build/app/outputs/flutter-apk/app-debug.apk apk/flutter/
          cp Mobiles/react-native/android/app/build/outputs/apk/debug/app-debug.apk apk/react-native/
          cp Mobiles/android/app/build/outputs/apk/debug/app-debug.apk apk/android-native/

      - name: Verify APKs
        run: |
          echo "Verifying built APKs..."
          ls -la apk/flutter/
          file apk/flutter/app-debug.apk
          echo "Flutter APK size: $(du -h apk/flutter/app-debug.apk | cut -f1)"
          ls -la apk/react-native/
          file apk/react-native/app-debug.apk
          echo "React Native APK size: $(du -h apk/react-native/app-debug.apk | cut -f1)"
          ls -la apk/android-native/
          file apk/android-native/app-debug.apk
          echo "Android Native APK size: $(du -h apk/android-native/app-debug.apk | cut -f1)"
          echo "APKs verified"

      - name: Start QuickPizza backend (Docker Compose)
        env:
          GRAFANA_CLOUD_STACK: ${{ env.GRAFANA_CLOUD_STACK }}
          GRAFANA_CLOUD_TOKEN: ${{ env.GRAFANA_CLOUD_TOKEN }}
          DEPLOYMENT_ENVIRONMENT: ci
          # Use dev Alloy config for grafana-dev.net stack
          ALLOY_FILE_NAME: cloud-dev.alloy
          # Mobile fork image (k6 workflows keep upstream quickpizza-local).
          QUICKPIZZA_IMAGE: ghcr.io/grafana/quickpizza-mobile-local:latest
        run: |
          echo "Starting QuickPizza backend (Grafana Cloud microservices + dev Alloy override)..."
          docker compose -f compose.grafana-cloud.microservices.yaml -f compose.grafana-cloud.dev-override.yaml up -d
          docker compose -f compose.grafana-cloud.microservices.yaml -f compose.grafana-cloud.dev-override.yaml ps

          echo "Waiting for backend to be ready..."
          for i in {1..60}; do
            if curl -fsS "http://localhost:3333/ready" > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting for backend... attempt $i/60"
            sleep 2
          done

          echo "Backend did not become ready in time"
          docker compose -f compose.grafana-cloud.microservices.yaml -f compose.grafana-cloud.dev-override.yaml logs --no-color
          exit 1

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: Install shared e2e report generator deps
        working-directory: Mobiles/e2e/report-generator
        run: npm ci --ignore-scripts

      - name: Run Android emulator and e2e tests
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b # v2.35.0
        env:
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          disk-size: 6000M
          heap-size: 600M
          emulator-options: "-no-window -no-metrics"
          script: |
            echo "Emulator is running!"
            adb devices -l

            # Single reverse for all apps on the same emulator (devices use localhost:3333)
            echo "Setting up ADB reverse port forwarding..."
            adb reverse tcp:3333 tcp:3333

            echo "==> Flutter APK: install and E2E"
            adb install -r apk/flutter/app-debug.apk
            bash Mobiles/e2e/run_e2e_tests.sh --app=flutter --platform=android

            echo "==> React Native APK: install and E2E"
            adb install -r apk/react-native/app-debug.apk
            bash Mobiles/e2e/run_e2e_tests.sh --app=react-native --platform=android

            echo "==> Android Native APK: install and E2E"
            adb install -r apk/android-native/app-debug.apk
            bash Mobiles/e2e/run_e2e_tests.sh --app=android-native --platform=android

            echo "E2E tests completed (Flutter, React Native, Android Native on same emulator)."

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results-android
          path: Mobiles/e2e/results/
          retention-days: 1
          if-no-files-found: ignore

      - name: Collect backend logs
        if: always()
        run: |
          docker compose -f compose.grafana-cloud.microservices.yaml -f compose.grafana-cloud.dev-override.yaml logs --no-color > backend.log 2>&1 || true

      - name: Stop backend
        if: always()
        run: |
          docker compose -f compose.grafana-cloud.microservices.yaml -f compose.grafana-cloud.dev-override.yaml down -v || true

      - name: Upload backend logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-logs-android
          path: backend.log
          retention-days: 3
          if-no-files-found: ignore

  run-ios-mobile-demo:
    name: Run iOS Mobile Demo
    # macOS-only: xcrun simctl + the booted iOS simulator only work on macOS.
    runs-on: macos-26
    timeout-minutes: 180
    environment: mobile-demo-telemetry
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Get Vault secrets
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@5d7e361bc7e0a183cde8afe9899fb7b596d2659b # v1.2.0
        with:
          repo_secrets: |
            FARO_COLLECTOR_URL=faro_collector_url:value
            FARO_COLLECTOR_URL_RN=faro_collector_url_rn:value
            OTLP_ENDPOINT=otlp_endpoint_android_native:value
            OTLP_INSTANCE_ID=otlp_instance_id_android_native:value
            OTLP_API_KEY=otlp_api_key_android_native:value
            OPENAI_API_KEY=openai_api_key:value

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-path --sdk iphonesimulator

      - name: Create Config.xcconfig for CI
        working-directory: Mobiles/ios
        env:
          OTLP_ENDPOINT: ${{ env.OTLP_ENDPOINT }}
          OTLP_INSTANCE_ID: ${{ env.OTLP_INSTANCE_ID }}
          OTLP_API_KEY: ${{ env.OTLP_API_KEY }}
        run: |
          # BASE_URL points at localhost on the host running the simulator,
          # which is the same machine as the runner. xcconfig URLs require
          # /$()/ to escape the :// since semicolons split values.
          cat > Config.xcconfig <<EOF
          BASE_URL = http:/\$()/localhost:3333
          PORT = 3333
          OTLP_ENDPOINT = ${OTLP_ENDPOINT}
          OTLP_INSTANCE_ID = ${OTLP_INSTANCE_ID}
          OTLP_API_KEY = ${OTLP_API_KEY}
          EOF
          echo "Created Config.xcconfig (secrets redacted)"

      - name: Build iOS .app for Simulator
        id: build-ios-app
        working-directory: Mobiles/ios
        run: |
          set -e
          echo "Building QuickPizzaIos.app for iOS Simulator..."
          mkdir -p build/ci
          SRCROOT="$PWD" Scripts/generate-config.sh
          set +e
          xcodebuild \
            -project QuickPizzaIos.xcodeproj \
            -scheme QuickPizzaIos \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            build > build/ci/xcodebuild.log 2>&1
          build_status=$?
          set -e

          if [ "$build_status" -ne 0 ]; then
            echo "xcodebuild failed with status $build_status"
            echo "Relevant build diagnostics:"
            grep -nE "error:|fatal error:|BUILD FAILED|The following build commands failed|Command SwiftCompile failed" build/ci/xcodebuild.log | tail -200 || true
            echo "Last 300 xcodebuild log lines:"
            tail -300 build/ci/xcodebuild.log
            exit "$build_status"
          fi

          tail -80 build/ci/xcodebuild.log

          APP_PATH=$(find DerivedData/Build/Products -name "QuickPizzaIos.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not locate built QuickPizzaIos.app under DerivedData"
            exit 1
          fi
          echo "Built app: $APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload iOS build log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-native-build-log
          path: Mobiles/ios/build/ci/xcodebuild.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Set up Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046 # v2.19.0
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Install Flutter dependencies
        working-directory: Mobiles/flutter
        run: flutter pub get

      - name: Create Flutter config.json for CI
        working-directory: Mobiles/flutter
        env:
          FARO_COLLECTOR_URL: ${{ env.FARO_COLLECTOR_URL }}
        run: |
          cat > config.json << EOF
          {
            "FARO_COLLECTOR_URL": "${FARO_COLLECTOR_URL}",
            "BASE_URL": "",
            "PORT": "3333",
            "CI_DEMO_VERSIONING": "true"
          }
          EOF
          echo "Created Flutter config.json (FARO_COLLECTOR_URL redacted)"

      - name: Build Flutter iOS .app for Simulator
        id: build-flutter-ios-app
        working-directory: Mobiles/flutter
        run: |
          set -e
          echo "Building Flutter iOS .app for Simulator..."
          flutter build ios --debug --simulator --dart-define-from-file=config.json

          APP_PATH="build/ios/iphonesimulator/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not locate Flutter iOS .app at $APP_PATH"
            find build/ios -maxdepth 4 -name "*.app" -type d
            exit 1
          fi
          echo "Built app: $APP_PATH"
          echo "app_path=$(pwd)/$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ">=24.5.0"

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          # Ruby 3.4 currently breaks this CocoaPods install via missing kconv.
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install React Native JavaScript dependencies
        working-directory: Mobiles/react-native
        run: yarn install --immutable

      - name: Install React Native iOS dependencies
        working-directory: Mobiles/react-native
        run: |
          bundle config set path vendor/bundle
          bundle install
          cd ios
          bundle exec pod install

      - name: Create React Native config.json for CI
        working-directory: Mobiles/react-native
        env:
          FARO_COLLECTOR_URL: ${{ env.FARO_COLLECTOR_URL_RN }}
        run: |
          cat > config.json << EOF
          {
            "FARO_COLLECTOR_URL": "${FARO_COLLECTOR_URL}",
            "BASE_URL": "",
            "PORT": "3333"
          }
          EOF
          echo "Created React Native config.json (FARO_COLLECTOR_URL redacted)"

      - name: Build React Native iOS .app for Simulator
        id: build-react-native-ios-app
        working-directory: Mobiles/react-native
        run: |
          set -e
          echo "Building React Native iOS .app for Simulator..."
          mkdir -p ios/build/ci
          set +e
          # Release + FORCE_BUNDLING embeds the JS bundle so e2e does not need Metro.
          FORCE_BUNDLING=1 xcodebuild \
            -workspace ios/QuickPizza.xcworkspace \
            -scheme QuickPizza \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath ios/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.quickpizza \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            build > ios/build/ci/xcodebuild.log 2>&1
          build_status=$?
          set -e

          if [ "$build_status" -ne 0 ]; then
            echo "xcodebuild failed with status $build_status"
            echo "Relevant build diagnostics:"
            grep -nE "error:|fatal error:|BUILD FAILED|The following build commands failed|Command SwiftCompile failed" ios/build/ci/xcodebuild.log | tail -200 || true
            echo "Last 300 xcodebuild log lines:"
            tail -300 ios/build/ci/xcodebuild.log
            exit "$build_status"
          fi

          tail -80 ios/build/ci/xcodebuild.log

          APP_PATH=$(find ios/DerivedData/Build/Products -name "QuickPizza.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not locate built QuickPizza.app under ios/DerivedData"
            find ios/DerivedData/Build/Products -maxdepth 4 -name "*.app" -type d || true
            exit 1
          fi
          echo "Built app: $APP_PATH"
          echo "app_path=$(pwd)/$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload React Native iOS build log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: react-native-ios-build-log
          path: Mobiles/react-native/ios/build/ci/xcodebuild.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Set up Go (QuickPizza backend)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build QuickPizza backend
        run: |
          set -e
          make build-go

      - name: Start QuickPizza backend
        env:
          DEPLOYMENT_ENVIRONMENT: ci
        run: |
          set -e
          touch backend-ios.log
          echo "Starting QuickPizza backend natively on macOS..."
          QUICKPIZZA_TRUST_CLIENT_TRACEID=1 \
          QUICKPIZZA_ENABLE_ALL_SERVICES=1 \
          QUICKPIZZA_DB= \
          QUICKPIZZA_TIMEOUT=10s \
          QUICKPIZZA_OTEL_SERVICE_NAME=quickpizza-ios-ci-backend \
          OTEL_RESOURCE_ATTRIBUTES="deployment.environment=${DEPLOYMENT_ENVIRONMENT},service.version=quickpizza-local" \
          ./bin/quickpizza > backend-ios.log 2>&1 &
          echo "$!" > backend-ios.pid

          echo "Waiting for backend to be ready..."
          for i in {1..60}; do
            if curl -fsS "http://localhost:3333/ready" > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting for backend... attempt $i/60"
            sleep 2
          done

          echo "Backend did not become ready in time"
          cat backend-ios.log
          exit 1

      - name: Boot iOS simulator
        run: |
          set -e
          # Pick the newest available iPhone runtime/device on the runner.
          IFS=$'\t' read -r DEVICE_UDID DEVICE_NAME < <(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          for runtime in sorted(data.get("devices", {}).keys(), reverse=True):
              for d in data["devices"][runtime]:
                  if d.get("isAvailable") and "iPhone" in d.get("name", ""):
                      print(d["udid"], d["name"], sep="\t")
                      sys.exit(0)
          sys.exit(1)
          ')
          if [ -z "$DEVICE_UDID" ]; then
            echo "No available iPhone simulator on this runner image"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting simulator: $DEVICE_NAME ($DEVICE_UDID)"
          xcrun simctl boot "$DEVICE_UDID" || true
          xcrun simctl bootstatus "$DEVICE_UDID" -b
          xcrun simctl list devices booted

      - name: Setup npm
        run: npm install -g npm@11.10.0

      - name: Install shared e2e report generator deps
        working-directory: Mobiles/e2e/report-generator
        run: npm ci --ignore-scripts

      - name: Install iOS apps and run e2e tests
        env:
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          IOS_NATIVE_APP_PATH: ${{ steps.build-ios-app.outputs.app_path }}
          FLUTTER_IOS_APP_PATH: ${{ steps.build-flutter-ios-app.outputs.app_path }}
          REACT_NATIVE_IOS_APP_PATH: ${{ steps.build-react-native-ios-app.outputs.app_path }}
        run: |
          set -e

          echo "==> Native iOS .app: install and E2E"
          if [ ! -d "$IOS_NATIVE_APP_PATH" ]; then
            echo "Expected QuickPizzaIos.app at $IOS_NATIVE_APP_PATH but it does not exist"
            exit 1
          fi
          xcrun simctl uninstall booted com.grafana.QuickPizzaIos || true
          xcrun simctl install booted "$IOS_NATIVE_APP_PATH"
          xcrun simctl get_app_container booted com.grafana.QuickPizzaIos
          bash Mobiles/e2e/run_e2e_tests.sh --app=ios-native --platform=ios

          echo "==> Flutter iOS .app: install and E2E"
          if [ ! -d "$FLUTTER_IOS_APP_PATH" ]; then
            echo "Expected Runner.app at $FLUTTER_IOS_APP_PATH but it does not exist"
            exit 1
          fi
          xcrun simctl uninstall booted com.example.flutterMobileO11yDemo || true
          xcrun simctl install booted "$FLUTTER_IOS_APP_PATH"
          xcrun simctl get_app_container booted com.example.flutterMobileO11yDemo
          bash Mobiles/e2e/run_e2e_tests.sh --app=flutter --platform=ios

          echo "==> React Native iOS .app: install and E2E"
          if [ ! -d "$REACT_NATIVE_IOS_APP_PATH" ]; then
            echo "Expected QuickPizza.app at $REACT_NATIVE_IOS_APP_PATH but it does not exist"
            exit 1
          fi
          xcrun simctl uninstall booted com.quickpizza || true
          xcrun simctl install booted "$REACT_NATIVE_IOS_APP_PATH"
          xcrun simctl get_app_container booted com.quickpizza
          bash Mobiles/e2e/run_e2e_tests.sh --app=react-native --platform=ios

          echo "iOS E2E tests completed (Native iOS, Flutter iOS, React Native iOS on same simulator)."

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results-ios
          path: Mobiles/e2e/results/
          retention-days: 1
          if-no-files-found: ignore

      - name: Collect backend logs
        if: always()
        run: |
          if [ -f backend-ios.log ]; then
            tail -200 backend-ios.log
          fi

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend-ios.pid ]; then
            kill "$(cat backend-ios.pid)" || true
          fi

      - name: Upload backend logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-logs-ios
          path: backend-ios.log
          retention-days: 3
          if-no-files-found: ignore
